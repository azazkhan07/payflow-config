spring:
  datasource:
    url: jdbc:postgresql://prod-server:5432/auth_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

server:
  port: 9092

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka