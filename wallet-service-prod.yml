spring:
  datasource:
    url: jdbc:postgresql://wallet-db-prod:5432/wallet_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

server:
  port: 9084

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka