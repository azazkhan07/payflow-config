spring:
  datasource:
    url: jdbc:postgresql://payment-db-prod:5432/payment_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: 9096

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka