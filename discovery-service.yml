spring:
  application:
    name: discovery-service
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest  

info:
  app:
    name: "Discovery Service"
    description: "Eureka Service Registry"
    version: "1.0"

management:
  endpoints:
    web:
      exposure:
        include: "*"

eureka:
  instance:
    prefer-ip-address: true
    hostname: localhost

  client:
    register-with-eureka: false
    fetch-registry: false
